<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Defect Tracking Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --border: #1f2937;
      --accent: #3b82f6;
      --danger: #ef4444;
      --warn: #f59e0b;
      --ok: #10b981;
      --text: #f9fafb;
      --muted: #6b7280;
      --font: 'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    header h1 {
      font-size: 14px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .pulse {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--ok);
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 20px 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }

    .card .label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .card .value {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .value.danger { color: var(--danger); }
    .value.warn   { color: var(--warn); }
    .value.ok     { color: var(--ok); }
    .value.accent { color: var(--accent); }

    .main {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 16px;
      padding: 0 24px 24px;
    }

    .feed-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .feed-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    .feed {
      height: 420px;
      overflow-y: auto;
      padding: 8px 0;
    }

    .feed::-webkit-scrollbar { width: 4px; }
    .feed::-webkit-scrollbar-track { background: var(--surface); }
    .feed::-webkit-scrollbar-thumb { background: var(--border); }

    .event {
      display: grid;
      grid-template-columns: 80px 70px 90px 1fr 70px;
      gap: 8px;
      align-items: center;
      padding: 8px 16px;
      border-bottom: 1px solid #161e2e;
      font-size: 11px;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .event:hover { background: #161e2e; }

    .badge {
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .badge.confirmed { background: #7f1d1d; color: var(--danger); }
    .badge.uncertain { background: #78350f; color: var(--warn); }
    .badge.ok        { background: #064e3b; color: var(--ok); }

    .cam-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .cam-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .cam-card .cam-title {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .cam-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }

    .cam-row:last-child { border-bottom: none; }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .status-dot.online  { background: var(--ok); }
    .status-dot.offline { background: var(--danger); }
    .status-dot.degraded { background: var(--warn); }

    canvas { width: 100% !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const API = "http://localhost:8000";
    const WS  = "ws://localhost:8000/stream/ws";

    function useMetrics() {
      const [data, setData] = useState(null);
      useEffect(() => {
        const fetch_ = () =>
          fetch(`${API}/metrics`)
            .then(r => r.json())
            .then(setData)
            .catch(() => {});
        fetch_();
        const id = setInterval(fetch_, 3000);
        return () => clearInterval(id);
      }, []);
      return data;
    }

    function useCameras() {
      const [cams, setCams] = useState([]);
      useEffect(() => {
        const fetch_ = () =>
          fetch(`${API}/cameras`)
            .then(r => r.json())
            .then(setCams)
            .catch(() => {});
        fetch_();
        const id = setInterval(fetch_, 5000);
        return () => clearInterval(id);
      }, []);
      return cams;
    }

    function useDefectFeed() {
      const [events, setEvents] = useState([]);
      useEffect(() => {
        // Load initial data
        fetch(`${API}/defects?limit=30`)
          .then(r => r.json())
          .then(d => setEvents(d.reverse()))
          .catch(() => {});

        // Live WebSocket updates
        const ws = new WebSocket(WS);
        ws.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (msg.type === "defect") {
            setEvents(prev => [msg, ...prev].slice(0, 100));
          }
        };
        return () => ws.close();
      }, []);
      return events;
    }

    function StatCard({ label, value, color }) {
      return (
        <div className="card">
          <div className="label">{label}</div>
          <div className={`value ${color}`}>{value ?? "—"}</div>
        </div>
      );
    }

    function EventBadge({ decision }) {
      const cls = decision === "DEFECT_CONFIRMED" ? "confirmed"
                : decision === "UNCERTAIN" ? "uncertain" : "ok";
      const label = decision === "DEFECT_CONFIRMED" ? "CONFIRMED"
                  : decision === "UNCERTAIN" ? "UNCERTAIN" : "OK";
      return <span className={`badge ${cls}`}>{label}</span>;
    }

    function Feed({ events }) {
      const ref = useRef(null);
      return (
        <div className="feed-wrap">
          <div className="feed-header">
            <span>Live Event Feed</span>
            <span>{events.length} events</span>
          </div>
          <div className="feed" ref={ref}>
            {events.length === 0 && (
              <div style={{ padding: "24px 16px", color: "var(--muted)", fontSize: 11 }}>
                Waiting for events...
              </div>
            )}
            {events.map((ev, i) => (
              <div className="event" key={i}>
                <span style={{ color: "var(--muted)" }}>
                  {ev.timestamp
                    ? new Date(ev.timestamp * 1000).toLocaleTimeString()
                    : "—"}
                </span>
                <span style={{ color: "var(--accent)" }}>{ev.camera_id || "—"}</span>
                <span style={{ color: "#a78bfa" }}>#{ev.global_id || "—"}</span>
                <span>{ev.label || "—"}</span>
                <EventBadge decision={ev.decision} />
              </div>
            ))}
          </div>
        </div>
      );
    }

    function CameraPanel({ cameras }) {
      return (
        <div className="cam-panel">
          <div className="cam-card">
            <div className="cam-title">Camera Status</div>
            {cameras.length === 0 && (
              <div style={{ color: "var(--muted)", fontSize: 11 }}>No cameras registered</div>
            )}
            {cameras.map(cam => (
              <div className="cam-row" key={cam.camera_id}>
                <span>
                  <span className={`status-dot ${cam.status}`} />
                  {cam.camera_id}
                </span>
                <span style={{ color: "var(--muted)" }}>
                  {cam.fps ? `${cam.fps.toFixed(1)} fps` : cam.status}
                </span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      const metrics = useMetrics();
      const cameras = useCameras();
      const events  = useDefectFeed();

      return (
        <>
          <header>
            <h1>⬡ Multi-Camera Defect Tracking</h1>
            <span style={{ fontSize: 11, color: "var(--muted)" }}>
              <span className="pulse" />
              LIVE
            </span>
          </header>

          <div className="grid">
            <StatCard label="Confirmed Defects"  value={metrics?.confirmed_defects}  color="danger" />
            <StatCard label="Uncertain"           value={metrics?.uncertain_defects}  color="warn"   />
            <StatCard label="Active Objects"      value={metrics?.active_objects}     color="accent" />
            <StatCard label="Cameras Online"      value={metrics?.active_cameras}     color="ok"     />
          </div>

          <div className="main">
            <Feed events={events} />
            <CameraPanel cameras={cameras} />
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
